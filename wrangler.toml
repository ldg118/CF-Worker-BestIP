# Cloudflare Workers / Pages 配置文件
# 支持两种部署方式：
# 1. Workers: wrangler deploy (npm run deploy)
# 2. Pages: wrangler pages deploy (npm run deploy:pages)

name = "cf-best-ip"
main = "worker.js"
compatibility_date = "2024-01-01"

# ==================== D1 数据库配置 ====================
# 1. 执行命令创建数据库：npx wrangler d1 create cf-best-ip-db
# 2. 将返回的 database_id 填入下面
[[d1_databases]]
binding = "DB"
database_name = "cf-best-ip-db"
database_id = ""

# ==================== KV 存储配置 ====================
# 1. 执行命令创建 KV 命名空间：npx wrangler kv:namespace create KV
# 2. 将返回的 id 填入下面
# 3. 执行命令创建预览环境 KV：npx wrangler kv:namespace create KV --preview
# 4. 将返回的 id 填入 preview_id
[[kv_namespaces]]
binding = "KV"
id = ""
preview_id = ""

# ==================== 环境变量配置 ====================
[vars]
ADMIN_PASSWORD = "123"  # 建议修改为强密码
DEFAULT_IP_COUNT = "3"
DEFAULT_TEST_COUNT = "50"
DEFAULT_THREAD_COUNT = "10"
DEFAULT_BANDWIDTH_FILE_SIZE = "3"
FAILED_IP_COOLDOWN_DAYS = "15"
MAX_HIGH_QUALITY_POOL_SIZE = "30"

# ==================== 定时任务配置 (仅 Workers 支持) ====================
[triggers]
cron = [
  { cron = "0 * * * *" }  # 每小时执行一次
]

# ==================== 生产环境变量 (敏感信息) ====================
# 使用 wrangler secret put 命令设置，不要在这里填写真实值
# wrangler secret put CF_API_TOKEN
# wrangler secret put CF_ZONE_ID
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put TELEGRAM_CHAT_ID

# ==================== 开发环境配置 ====================
[env.development]
name = "cf-best-ip-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "cf-best-ip-db-dev"
database_id = ""

[[env.development.kv_namespaces]]
binding = "KV"
id = ""
preview_id = ""

[env.development.vars]
ADMIN_PASSWORD = "dev_password"
DEFAULT_IP_COUNT = "3"
DEFAULT_TEST_COUNT = "10"
DEFAULT_THREAD_COUNT = "5"

# ==================== Pages 配置 (可选) ====================
# 如需同时部署到 Pages，取消下面注释
# [site]
# bucket = "./public"
